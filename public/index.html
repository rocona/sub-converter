<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surge Subscription Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="shell compact-shell">
      <div class="page-stack">
        <form class="panel self-panel" id="convert-form">
          <p class="eyebrow">Self Use</p>
          <h1>订阅替换</h1>
          <p class="summary">
            粘贴原始订阅链接，页面会按当前内置规则生成新的订阅 URL，并在下方预览转换结果。
          </p>

          <div class="simple-stack">
            <label class="field">
              <span>原始订阅</span>
              <input
                id="subscription-url"
                type="url"
                placeholder="https://example.com/api/v1/client/subscribe?token=..."
                autocomplete="off"
              />
            </label>

            <label class="field">
              <span>新的订阅 URL</span>
              <input
                id="generated-url"
                type="text"
                readonly
                placeholder="先粘贴原始订阅链接，再生成新的 URL"
              />
            </label>
          </div>

          <p id="status-text" class="status-text">等待输入原始订阅链接。</p>

          <div class="actions">
            <button class="primary" type="submit">生成并预览</button>
            <button class="ghost" id="copy-link" type="button">复制新 URL</button>
            <button class="ghost" id="open-link" type="button">打开新 URL</button>
          </div>
        </form>

        <section class="panel output-panel">
          <div class="section-head">
            <h2>转换结果</h2>
            <p id="preview-status">正在生成默认预览...</p>
          </div>

          <div class="metrics">
            <div class="metric-card">
              <span>Total</span>
              <strong id="metric-total">0</strong>
            </div>
            <div class="metric-card">
              <span>Input</span>
              <strong id="metric-input">0</strong>
            </div>
            <div class="metric-card">
              <span>VMess</span>
              <strong id="metric-vmess">0</strong>
            </div>
            <div class="metric-card">
              <span>SS</span>
              <strong id="metric-ss">0</strong>
            </div>
            <div class="metric-card">
              <span>Trojan</span>
              <strong id="metric-trojan">0</strong>
            </div>
            <div class="metric-card">
              <span>Hysteria2</span>
              <strong id="metric-hysteria2">0</strong>
            </div>
          </div>

          <div class="actions toolbar">
            <button class="ghost" id="copy-result" type="button">复制结果</button>
            <button class="ghost" id="download-result" type="button">下载 .conf</button>
          </div>

          <pre id="result" class="result-block">[Proxy]
# Converted output will appear here.</pre>

          <div id="warnings" class="warnings hidden"></div>
        </section>
      </div>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
