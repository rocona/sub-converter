<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surge Subscription Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="shell compact-shell">
      <div class="page-stack">
        <form class="panel self-panel" id="convert-form">
          <p class="eyebrow">Self Use</p>
          <h1>节点预览</h1>
          <p class="summary">
            粘贴原始订阅链接，页面只做节点列表转换，并在下方显示预览结果。
          </p>

          <div class="simple-stack">
            <label class="field">
              <span>原始订阅</span>
              <input
                id="subscription-url"
                type="url"
                placeholder="https://example.com/api/v1/client/subscribe?token=..."
                autocomplete="off"
              />
            </label>
          </div>

          <p id="status-text" class="status-text">等待输入原始订阅链接。</p>

          <div class="actions">
            <button class="primary" type="submit">转换并预览</button>
          </div>
        </form>

        <section class="panel output-panel">
          <div class="section-head">
            <h2>节点列表预览</h2>
            <p id="preview-status">这里只显示节点列表预览。</p>
          </div>

          <pre id="result" class="result-block"># Node preview will appear here.</pre>
        </section>
      </div>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
