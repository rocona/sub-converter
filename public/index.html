<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surge Subscription Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="shell compact-shell">
      <section class="panel self-panel">
        <p class="eyebrow">Self Use</p>
        <h1>订阅替换</h1>
        <p class="summary">
          页面已经内置默认转换规则，不需要填写参数。直接复制新的订阅 URL，替换回 Surge 即可。
        </p>

        <div class="simple-stack">
          <label class="field">
            <span>原始订阅</span>
            <input
              id="source-display"
              type="text"
              readonly
              placeholder="服务端默认订阅"
            />
          </label>

          <label class="field">
            <span>新的订阅 URL</span>
            <input
              id="generated-url"
              type="text"
              readonly
              placeholder="正在生成..."
            />
          </label>
        </div>

        <p id="status-text" class="status-text">正在读取默认配置...</p>

        <div class="actions">
          <button class="primary" id="copy-link" type="button">复制新 URL</button>
          <button class="ghost" id="open-link" type="button">打开新 URL</button>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
